  - name: "🔯 美国故转"
    type: fallback
    use:
      - Airport1
    filter: "美|US|United States|America|Los Angeles|Silicon Valley"
    url: "http://www.gstatic.com/generate_204"
    interval: 300

  - name: "🇭🇰 香港节点"
    type: select
    use:
      - Airport1
    filter: "港|HK|Hong Kong|HongKong|hongkong"

  - name: "🇯🇵 日本节点"
