port: 7890
socks-port: 7891
mixed-port: 7893
allow-lan: true
mode: rule
log-level: warning
ipv6: false
external-controller: "127.0.0.1:9090"
unified-delay: true
profile:
  store-selected: true

proxy-providers:
  Airport1:
    type: http
    url: "https://1e665040583a218a3de492ac0dc72e38.cdn-res-oss-cn-hongkong-aliyuncs-file.com/s?t=1e665040583a218a3de492ac0dc72e38.jpg"
    interval: 86400
    path: "./providers/Airport1.yaml"
    health-check:
      enable: true
      interval: 300
      url: "http://www.gstatic.com/generate_204"

